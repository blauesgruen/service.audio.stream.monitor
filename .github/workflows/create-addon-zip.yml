name: Create Addon ZIP

on:
  push:
    branches: [ master ]
    paths:
      - 'addon.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: get_version
        run: |
          VERSION=$(grep -oP 'version="\K[^"]+' addon.xml | head -1)
          PREVIOUS=$(git show HEAD~1:addon.xml 2>/dev/null | grep -oP 'version="\K[^"]+' | head -1 || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "$VERSION" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP
        if: steps.get_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p build/service.audio.stream.monitor
          rsync -av --exclude='.git' --exclude='.github' --exclude='.vscode' --exclude='.gitignore' --exclude='build' . build/service.audio.stream.monitor/
          cd build
          zip -r ../service.audio.stream.monitor-${{ steps.get_version.outputs.version }}.zip service.audio.stream.monitor/

      - name: Create Release
        if: steps.get_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          files: service.audio.stream.monitor-${{ steps.get_version.outputs.version }}.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
